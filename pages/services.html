<!DOCTYPE html>
<html lang="vi">

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <img src="../assets/images/logo-vnpt.png" alt="Logo VNPT" class="logo-img" onerror="this.src='https://placehold.co/40x40?text=VNPT'">
                <span class="fw-bold text-dark fs-4 ms-2">VNPT <span class="text-primary">Digishop</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#vnptNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="vnptNavbar">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="./about.html">Giới Thiệu</a></li>

                    <option value="wifi">Mạng Cáp Quang Wifi</option>

    <button id="backToTopBtn"><i class="bi bi-arrow-up-short"></i></button>
